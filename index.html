<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterbit-256 | Secure Data Encryption</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: #ededed; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow:focus { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); border-color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <header class="mb-12 text-center">
        <h1 class="text-4xl font-bold tracking-tighter text-blue-500 mb-2">MASTERBIT-256</h1>
        <p class="text-gray-400 text-sm uppercase tracking-widest">Military-Grade Client-Side Security</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        
        <div class="glass p-8 rounded-2xl shadow-2xl">
            <div class="space-y-4">
                
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-2">Encryption Secret</label>
                    <input type="password" id="password" placeholder="••••••••••••" 
                           class="w-full bg-black/50 border border-white/10 rounded-lg p-3 glow outline-none transition-all">
                </div>

                <div class="relative group">
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-2">Target Data</label>
                    <div class="border-2 border-dashed border-white/10 rounded-xl p-8 text-center group-hover:border-blue-500/50 transition-colors">
                        <i class="fa-solid fa-file-shield text-3xl text-gray-600 mb-3 group-hover:text-blue-500 transition-colors"></i>
                        <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <p id="fileName" class="text-sm text-gray-400">Drag file or <span class="text-blue-500">browse</span></p>
                    </div>
                </div>

                <div id="progressContainer" class="hidden">
                    <div class="w-full bg-white/5 rounded-full h-1.5 overflow-hidden">
                        <div id="progressBar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
                    </div>
                    <p class="text-[10px] text-center mt-2 text-gray-500 italic">Processing locally...</p>
                </div>

                <button id="encryptBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-sm tracking-wide transition-all transform active:scale-95 shadow-lg shadow-blue-900/20">
                    <i class="fa-solid fa-lock mr-2"></i> ENCRYPT & DOWNLOAD
                </button>

            </div>
        </div>

        <div class="flex justify-center items-center gap-6 text-gray-600">
            <div class="flex items-center gap-2 text-xs">
                <i class="fa-solid fa-circle-check text-green-500/50"></i>
                AES-GCM 256
            </div>
            <div class="flex items-center gap-2 text-xs">
                <i class="fa-solid fa-circle-check text-green-500/50"></i>
                Zero-Knowledge
            </div>
        </div>

    </main>

    <script type="module" src="./src/app.js"></script>
</body>
                  </html>
